name: polybot

services:
  bot:
    container_name: polybot
    build:
      context: .
      dockerfile: Dockerfile
    image: polybot:latest
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    mem_limit: 512m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
