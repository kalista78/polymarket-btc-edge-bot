name: knx-polymarket

services:
  bot:
    container_name: knx-polymarket-bot
    build:
      context: .
      dockerfile: Dockerfile
    image: knx-polymarket-bot:latest
    restart: unless-stopped
    env_file:
      - .env
    mem_limit: 768m
    cpus: 0.75
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
